<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <script>
      function getComputerChoice() {
        const randomNumber = Math.floor(Math.random() * 3);
        let computerChoice;
        switch (randomNumber) {
          case 0:
            computerChoice = "rock"
            return computerChoice
          case 1:
            computerChoice = "paper"
            return computerChoice
          default:
            computerChoice = "scissors"
            return computerChoice
        }   
      }

      function getPlayerSelection() {
        let playerSelection = prompt("Rock? Paper? Scissors?");
        playerSelection = playerSelection.trim().toLowerCase();
        if (playerSelection === "rock" || playerSelection === "paper" || playerSelection === "scissors") {
          return playerSelection
        }
        alert("Your input is not acceptable. Please try again.")
        return getPlayerSelection();
      }
      
      function playRound(playerSelection, computerSelection) {
        let winner;
        if (playerSelection === computerSelection) {
          winner = "";
          alert("It's a tie.");
          return 0;
        } else if (playerSelection === "rock" || computerSelection === "rock") {
          if (playerSelection === "paper" || computerSelection === "paper") {
            winner = "paper"
          } else {
            winner = "rock"
          }
        } else if (playerSelection === "paper" || computerSelection === "paper") {
          if (playerSelection === "scissors" || computerSelection === "scissors") {
            winner = "scissors"
          } 
        }
        
        if (winner === playerSelection) {
          alert(`You win! ${capitalize(winner)} beats ${capitalize(computerSelection)}`);
          return 1;
        } else {
          alert(`You lose! ${capitalize(winner)} beats ${capitalize(playerSelection)}`);
          return -1;
        }
      }

      function capitalize(string) {
        const firstLetter = string.at(0);
        const capitalizedLetter = firstLetter.toUpperCase();
        return string.replace(firstLetter, capitalizedLetter)
      }

      function game() {
        let score = 0;
        for (let i = 0; i < 5; i++) {
          score += playRound(getPlayerSelection(), getComputerChoice());
        }
        if (score > 0) {
          alert("Congratulations! You win the game!")
        } else if (score = 0) {
          alert("Game over. It's a draw.")
        } else {
          alert("Game over. You lose!")
        }

        if (confirm("Do you want to play again?")) {
          return game();
        }
      }

      game();
    </script>
</body>
</html>
